[world]
name = "Parchis Trivia Engine"
description = "Authoritative on-chain game engine for Parchis Trivia built with Dojo."
seed = "parchis_trivia"

[namespace]
default = "parchis_trivia"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# account_address = "0x..."
# keystore_path = "~/.starknet_accounts/sepolia.json"
# world_address = "0x..."

[writers]
"parchis_trivia-GameConfig" = ["parchis_trivia-config_system", "parchis_trivia-admin_system"]
"parchis_trivia-BoardSquare" = ["parchis_trivia-config_system", "parchis_trivia-admin_system"]
"parchis_trivia-GlobalState" = ["parchis_trivia-config_system", "parchis_trivia-lobby_system"]
"parchis_trivia-Game" = ["parchis_trivia-lobby_system", "parchis_trivia-turn_system"]
"parchis_trivia-GameSeat" = ["parchis_trivia-lobby_system"]
"parchis_trivia-LobbyCodeIndex" = ["parchis_trivia-lobby_system"]
"parchis_trivia-GameRuntimeConfig" = ["parchis_trivia-lobby_system"]
"parchis_trivia-GamePlayer" = ["parchis_trivia-lobby_system", "parchis_trivia-turn_system", "parchis_trivia-shop_system"]
"parchis_trivia-Token" = ["parchis_trivia-turn_system", "parchis_trivia-shop_system"]
"parchis_trivia-TurnState" = ["parchis_trivia-turn_system", "parchis_trivia-shop_system"]
"parchis_trivia-DiceState" = ["parchis_trivia-lobby_system", "parchis_trivia-turn_system"]
"parchis_trivia-BonusState" = ["parchis_trivia-lobby_system", "parchis_trivia-turn_system"]
"parchis_trivia-EgsConfig" = ["parchis_trivia-admin_system"]
"parchis_trivia-EgsSessionBinding" = ["parchis_trivia-egs_system", "parchis_trivia-turn_system"]
"parchis_trivia-PendingQuestion" = ["parchis_trivia-turn_system"]
"parchis_trivia-PlayerItem" = ["parchis_trivia-shop_system", "parchis_trivia-turn_system"]
"parchis_trivia-SquareOccupancy" = ["parchis_trivia-turn_system"]

[owners]
"parchis_trivia" = ["parchis_trivia-admin_system", "parchis_trivia-config_system"]
